<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PostureGuard Coach3D</title>
  <link rel="icon" href="data:," />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
    #gl, #overlay { position: absolute; left: 0; top: 0; width: 100%; height: 100%; display: block; }
    #overlay { pointer-events: none; }
    #hud {
      position: absolute; left: 12px; top: 12px;
      color: rgba(255,255,255,0.92);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 11px;
      background: rgba(10,20,30,0.72);
      padding: 10px 12px; border-radius: 12px;
      z-index: 100;
      max-width: calc(100vw - 24px);
    }
    #hud b { font-size: 12px; }
    #hud .muted { opacity: 0.65; }
  </style>

  <!-- Importmap polyfill (works with normal type=module). -->
  <script async src="./es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "./three.module.js",
        "@pixiv/three-vrm": "./three-vrm.module.js"
      }
    }
  </script>

  <script src="./kalidokit.umd.js"></script>
</head>
<body>
  <canvas id="gl"></canvas>
  <canvas id="overlay"></canvas>
  <div id="hud">
    <div><b>影子跟练 v2</b> <span class="muted">(3D VRM)</span></div>
    <div id="status" class="muted">页面已加载，等待 bundle.js...</div>
    <div id="score" class="muted">--</div>
    <div id="perf" class="muted"></div>
  </div>

  <script type="module" src="./bundle.js"></script>
</body>
</html>
